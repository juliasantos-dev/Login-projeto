<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <link rel="stylesheet" href="style.css">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div class="left">
    <h2>Fazer Login</h2>

    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" placeholder="E-mail">
    </div>

    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" placeholder="Senha">
    </div>

    <button id="loginBtn">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div class="right">
    <h2>Não tem uma conta?</h2>
    <p>Crie sua conta e explore este projeto desenvolvido com HTML, CSS e JavaScript.</p>

    <button class="outline" id="registerBtn">Cadastre-se</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
